<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan attendance QR — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-topbar">
  <div class="d-flex align-items-center gap-3">
    <a href="student-dashboard.html" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Back to dashboard</a>
    <h1 class="mb-0">Scan attendance QR</h1>
  </div>
</div>

<div class="gs-content" style="max-width:560px;margin:0 auto;">
  <div class="gs-card">
    <div class="gs-card-body text-center">

      <div id="scan-idle">
        <p class="gs-muted small">Point your camera at the QR code your
          faculty is displaying. Your location will be checked against the
          classroom geofence.</p>
        <button class="btn btn-gs-primary" id="start-camera-btn">
          <i class="bi bi-camera"></i> Start camera
        </button>
      </div>

      <div id="scan-active" class="d-none">
        <div class="gs-scan-video-wrap mb-3">
          <video id="scan-video" playsinline muted></video>
          <div class="gs-scan-reticle"></div>
        </div>
        <canvas id="scan-canvas" class="d-none"></canvas>
        <div class="gs-muted small" id="scan-status">Looking for a QR code…</div>
        <button class="btn btn-light btn-sm mt-2" id="stop-camera-btn">Cancel</button>
      </div>

      <hr class="my-4">

      <div class="text-start">
        <label class="form-label small fw-semibold">Or enter the session code manually</label>
        <div class="input-group">
          <input type="text" class="form-control" id="manual-token" placeholder="Paste session token">
          <button class="btn btn-gs-outline" id="manual-submit-btn">Submit</button>
        </div>
      </div>

      <div id="scan-result" class="mt-4"></div>
    </div>
  </div>
</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/scan-qr.js"></script>
</body>
</html>
