<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session expired — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-error-shell">
  <div class="gs-error-card">
    <i class="bi bi-clock-history gs-error-icon"></i>
    <h1>Session expired</h1>
    <p>You've been signed out for your security. Please sign in again to continue.</p>
    <div class="gs-error-actions">
      <a class="btn btn-gs-primary btn-sm" id="session-expired-login" href="login.html"><i class="bi bi-box-arrow-in-right"></i> Sign in again</a>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script>
  // Ensure any stale tokens are cleared so a re-login starts clean.
  try { GsStorage.clear(); } catch (e) {}
</script>
</body>
</html>
