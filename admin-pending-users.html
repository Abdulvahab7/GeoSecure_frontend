<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pending Registrations — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-shell">

  <aside class="gs-sidebar" id="gs-sidebar">
    <div class="gs-brand"><span class="gs-ping"></span> GeoSecure <span class="gs-role-tag">Admin</span></div>
    <nav class="gs-nav" id="gs-nav">
      <div class="gs-nav-label">Overview</div>
      <a class="gs-nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

      <div class="gs-nav-label">People</div>
      <a class="gs-nav-link active" href="admin-pending-users.html"><i class="bi bi-person-check"></i> Pending Registrations</a>
    </nav>
    <div class="gs-sidebar-footer">
      <button class="btn btn-outline-light btn-sm" id="logout-btn"><i class="bi bi-box-arrow-right"></i> Sign out</button>
    </div>
  </aside>

  <div class="gs-main">
    <div class="gs-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm gs-mobile-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
        <div>
          <h1>Pending Registrations</h1>
          <div class="gs-topbar-sub" id="topbar-user"></div>
        </div>
      </div>
    </div>

    <div class="gs-content" id="gs-content-main">
      <section class="gs-section active">

        <div class="gs-card mb-3">
          <div class="gs-card-body">
            <div class="row g-2 align-items-end">
              <div class="col-md-5">
                <label class="form-label small fw-semibold">Search</label>
                <input type="text" class="form-control" id="pending-search" placeholder="Search by name or email…">
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Role</label>
                <select class="form-select" id="pending-role-filter">
                  <option value="">All roles</option>
                  <option value="STUDENT">Student</option>
                  <option value="FACULTY">Faculty</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Department</label>
                <select class="form-select" id="pending-dept-filter">
                  <option value="">All departments</option>
                </select>
              </div>
              <div class="col-md-1">
                <button class="btn btn-outline-secondary w-100" id="pending-refresh-btn" title="Refresh"><i class="bi bi-arrow-clockwise"></i></button>
              </div>
            </div>
          </div>
        </div>

        <div class="gs-card">
          <div class="gs-card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Awaiting approval <span class="badge text-bg-secondary" id="pending-count-badge">0</span></h5>
          </div>
          <div class="table-responsive">
            <table class="table table-gs mb-0">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Registration Date</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="pending-users-body">
                <tr><td colspan="6" class="text-center gs-muted py-4">Loading…</td></tr>
              </tbody>
            </table>
          </div>
          <div class="gs-card-body d-flex justify-content-between align-items-center">
            <div class="small gs-muted" id="pending-page-info"></div>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="pending-pagination"></ul>
            </nav>
          </div>
        </div>

      </section>
    </div>
  </div>
</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/admin-pending-users.js"></script>
</body>
</html>
