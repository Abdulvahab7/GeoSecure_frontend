<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-shell">

  <aside class="gs-sidebar" id="gs-sidebar">
    <div class="gs-brand"><span class="gs-ping"></span> GeoSecure <span class="gs-role-tag">Student</span></div>
    <nav class="gs-nav" id="gs-nav">
      <div class="gs-nav-label">Overview</div>
      <div class="gs-nav-link active" data-section="overview"><i class="bi bi-speedometer2"></i> My attendance</div>

      <div class="gs-nav-label">Attendance</div>
      <div class="gs-nav-link" data-href="scan-qr.html"><i class="bi bi-qr-code-scan"></i> Scan QR</div>
      <div class="gs-nav-link" data-section="subjectwise"><i class="bi bi-journal-bookmark"></i> Subject-wise</div>
      <div class="gs-nav-link" data-section="monthly"><i class="bi bi-calendar3"></i> Monthly history</div>
      <div class="gs-nav-link" data-section="recent"><i class="bi bi-clock-history"></i> Recent activity</div>

      <div class="gs-nav-label">Account</div>
      <div class="gs-nav-link" data-href="notifications.html"><i class="bi bi-bell"></i> Notifications</div>
      <div class="gs-nav-link" data-section="profile"><i class="bi bi-person-circle"></i> Profile</div>
      <div class="gs-nav-link" data-section="settings"><i class="bi bi-gear"></i> Settings</div>
    </nav>
    <div class="gs-sidebar-footer">
      <button class="btn btn-outline-light btn-sm" id="logout-btn"><i class="bi bi-box-arrow-right"></i> Sign out</button>
    </div>
  </aside>

  <div class="gs-main">
    <div class="gs-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm gs-mobile-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
        <div>
          <h1 id="topbar-title">My attendance</h1>
          <div class="gs-topbar-sub" id="topbar-user"></div>
        </div>
      </div>
      <a href="scan-qr.html" class="btn btn-gs-primary btn-sm"><i class="bi bi-qr-code-scan"></i> Scan QR</a>
    </div>

    <div class="gs-content" id="gs-content-main">

      <section class="gs-section active" id="sec-overview">
        <div class="row g-3 mb-4" id="student-stats"></div>
        <div class="gs-card">
          <div class="gs-card-header"><h5>Attendance by subject</h5></div>
          <div class="table-responsive"><table class="table table-gs mb-0">
            <thead><tr><th>Subject</th><th>Total</th><th>Present</th><th>Absent</th><th>Percentage</th></tr></thead>
            <tbody id="subject-summary-body"></tbody>
          </table></div>
        </div>
      </section>

      <section class="gs-section" id="sec-subjectwise"></section>
      <section class="gs-section" id="sec-monthly"></section>
      <section class="gs-section" id="sec-recent"></section>
      <section class="gs-section" id="sec-profile"></section>
      <section class="gs-section" id="sec-settings"></section>

    </div>
  </div>
</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/reports.js"></script>
<script src="js/profile.js"></script>
<script src="js/student.js"></script>
</body>
</html>
