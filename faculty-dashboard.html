<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-shell">

  <aside class="gs-sidebar" id="gs-sidebar">
    <div class="gs-brand"><span class="gs-ping"></span> GeoSecure <span class="gs-role-tag">Faculty</span></div>
    <nav class="gs-nav" id="gs-nav">
      <div class="gs-nav-label">Overview</div>
      <div class="gs-nav-link active" data-section="overview"><i class="bi bi-speedometer2"></i> Today's schedule</div>

      <div class="gs-nav-label">Attendance</div>
      <div class="gs-nav-link" data-href="generate-qr.html"><i class="bi bi-qr-code"></i> Generate QR</div>
      <div class="gs-nav-link" data-section="subjects"><i class="bi bi-journal-bookmark"></i> My subjects</div>
      <div class="gs-nav-link" data-section="timetable"><i class="bi bi-calendar-week"></i> Weekly timetable</div>

      <div class="gs-nav-label">Responsibilities</div>
      <div class="gs-nav-link" data-section="mentees"><i class="bi bi-person-hearts"></i> My mentees</div>
      <div class="gs-nav-link" data-section="coordinated"><i class="bi bi-person-check"></i> Coordinated classes</div>
      <div class="gs-nav-link" data-section="pending-approvals"><i class="bi bi-person-plus"></i> Pending approvals</div>

      <div class="gs-nav-label">Insights</div>
      <div class="gs-nav-link" data-section="reports"><i class="bi bi-bar-chart"></i> Reports</div>
      <div class="gs-nav-link" data-section="notifications"><i class="bi bi-bell"></i> Notifications</div>

      <div class="gs-nav-label">Account</div>
      <div class="gs-nav-link" data-section="profile"><i class="bi bi-person-circle"></i> Profile</div>
      <div class="gs-nav-link" data-section="settings"><i class="bi bi-gear"></i> Settings</div>
    </nav>
    <div class="gs-sidebar-footer">
      <button class="btn btn-outline-light btn-sm" id="logout-btn"><i class="bi bi-box-arrow-right"></i> Sign out</button>
    </div>
  </aside>

  <div class="gs-main">
    <div class="gs-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm gs-mobile-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
        <div>
          <h1 id="topbar-title">Today's schedule</h1>
          <div class="gs-topbar-sub" id="topbar-user"></div>
        </div>
      </div>
    </div>

    <div class="gs-content" id="gs-content-main">

      <section class="gs-section active" id="sec-overview">
        <div class="gs-card">
          <div class="gs-card-header">
            <h5>Today's timetable</h5>
            <a href="generate-qr.html" class="btn btn-gs-primary btn-sm"><i class="bi bi-qr-code"></i> Generate QR</a>
          </div>
          <div class="table-responsive"><table class="table table-gs mb-0">
            <thead><tr><th>#</th><th>Subject</th><th>Class</th><th>Room</th></tr></thead>
            <tbody id="today-schedule-body"></tbody>
          </table></div>
        </div>
      </section>

      <section class="gs-section" id="sec-subjects"></section>
      <section class="gs-section" id="sec-timetable"></section>
      <section class="gs-section" id="sec-mentees"></section>
      <section class="gs-section" id="sec-coordinated"></section>
      <section class="gs-section" id="sec-pending-approvals"></section>
      <section class="gs-section" id="sec-reports"></section>
      <section class="gs-section" id="sec-profile"></section>
      <section class="gs-section" id="sec-notifications"></section>
      <section class="gs-section" id="sec-settings"></section>

    </div>
  </div>
</div>

<div class="modal fade" id="gs-entity-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="gs-entity-modal-title">Form</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="gs-entity-form">
        <div class="modal-body" id="gs-entity-modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gs-primary" id="gs-entity-modal-save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/reports.js"></script>
<script src="js/notifications.js"></script>
<script src="js/profile.js"></script>
<script src="js/faculty.js"></script>
</body>
</html>
