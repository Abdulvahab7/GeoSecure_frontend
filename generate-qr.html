<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate QR — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-topbar">
  <div class="d-flex align-items-center gap-3">
    <a href="faculty-dashboard.html" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Back to dashboard</a>
    <h1 class="mb-0">Generate attendance QR</h1>
  </div>
</div>

<div class="gs-content" style="max-width:920px;margin:0 auto;">

  <div id="qr-setup-card" class="gs-card mb-4">
    <div class="gs-card-header"><h5>Start a session</h5></div>
    <div class="gs-card-body">
      <p class="gs-muted small">Pick a slot from today's timetable. Your current
        location is captured when the session starts and used to verify
        students are within the geofence radius when they scan.</p>
      <div class="row g-3 align-items-end">
        <div class="col-md-8">
          <label class="form-label small fw-semibold">Today's session</label>
          <select class="form-select" id="timetable-select"></select>
        </div>
        <div class="col-md-4">
          <button class="btn btn-gs-primary w-100" id="start-session-btn">
            <i class="bi bi-qr-code"></i> Generate QR
          </button>
        </div>
      </div>
      <div id="qr-setup-error" class="alert alert-danger py-2 px-3 small mt-3 d-none"></div>
    </div>
  </div>

  <div id="qr-live-card" class="gs-card d-none">
    <div class="gs-card-header">
      <h5><span class="badge-status badge-live"><span class="gs-ping"></span> Session live</span></h5>
      <button class="btn btn-outline-danger btn-sm" id="end-session-btn">End session</button>
    </div>
    <div class="gs-card-body">
      <div class="row g-4">
        <div class="col-md-5 text-center">
          <div class="gs-qr-frame">
            <img id="qr-image" src="" alt="Attendance QR code">
          </div>
          <div class="mt-3">
            <div class="gs-muted small">Expires in</div>
            <div class="gs-countdown" id="qr-countdown">--</div>
          </div>
          <div class="gs-muted small mt-2" id="qr-session-meta"></div>
        </div>
        <div class="col-md-7">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="mb-0">Live roster</h6>
            <span class="gs-muted small" id="roster-summary"></span>
          </div>
          <div class="table-responsive" style="max-height:360px;overflow-y:auto;">
            <table class="table table-gs table-hover mb-0">
              <thead><tr><th>Student</th><th>Reg. no.</th><th>Status</th></tr></thead>
              <tbody id="roster-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/generate-qr.js"></script>
</body>
</html>
