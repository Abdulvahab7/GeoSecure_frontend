<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications — GeoSecure Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui-ux.css">
</head>
<body>
<div class="gs-topbar">
  <div class="d-flex align-items-center gap-3">
    <a href="#" id="back-link" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Back to dashboard</a>
    <h1 class="mb-0">Notifications</h1>
  </div>
  <button class="btn btn-gs-outline btn-sm" id="mark-all-read-btn">Mark all as read</button>
</div>

<div class="gs-content" style="max-width:760px;margin:0 auto;">
  <div class="gs-card">
    <div class="gs-card-header">
      <h5>All notifications</h5>
      <span class="gs-muted small" id="unread-summary"></span>
    </div>
    <div id="notif-list"></div>
  </div>
</div>

<div id="gs-toast-stack"></div>
<div class="gs-spinner-overlay" id="gs-spinner-overlay"><div class="spinner-border text-light"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-ux.js"></script>
<script src="js/perf.js"></script>
<script src="js/security.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
